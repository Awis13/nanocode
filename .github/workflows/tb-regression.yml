name: Terminal-Bench Regression

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Update baseline scores after run (creates a PR)'
        type: boolean
        default: false

jobs:
  tb-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Terminal-Bench
        run: pip install harbor-bench terminal-bench-core==0.1.1

      - name: Run Terminal-Bench subset
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NANOCODE_REF: ${{ github.ref_name }}
        run: |
          python harbor/scripts/tb_run_subset.py \
            --subset harbor/tb-ci-subset.txt \
            --output tb-results.json

      - name: Compare against baseline
        id: compare
        run: |
          python harbor/scripts/tb_check_regression.py \
            --results tb-results.json \
            --baseline harbor/tb-baseline.json \
            --threshold 5.0

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tb-results-${{ github.ref_name }}-${{ github.run_id }}
          path: tb-results.json
          retention-days: 90

      - name: Update baseline (on manual trigger)
        if: ${{ inputs.update_baseline == true }}
        run: |
          cp tb-results.json harbor/tb-baseline.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-tb-baseline-${{ github.run_id }}
          git add harbor/tb-baseline.json
          git commit -m "chore(tb): update baseline scores from ${{ github.ref_name }}"
          git push origin update-tb-baseline-${{ github.run_id }}
          gh pr create \
            --title "chore(tb): update TB baseline from ${{ github.ref_name }}" \
            --body "Auto-generated by tb-regression workflow run ${{ github.run_id }}." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
